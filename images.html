<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Research Images</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="wrapper">
      <!-- Sidebar -->

      <div id="sidebar"></div>

      <!-- Main Content -->

      <main class="main-content">
        <div class="page-header">
          <h1>Research Images</h1>
        </div>

        <!-- Research Photos -->

        <div class="card">
          <h2>Research Activities</h2>

          <div class="gallery">
            <div class="gallery-item">
              <img src="./data//images/1.jpeg" alt="Research Image" />

              <p>Research Activity 01</p>
            </div>

            <div class="gallery-item">
              <img src="./data//images/2.jpeg" alt="Research Image" />

              <p>Research Activity 02</p>
            </div>

            <div class="gallery-item">
              <img src="./data//images/3.jpeg" alt="Research Image" />

              <p>Research Activity 03</p>
            </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/sidebar.js"></script>
  </body>
</html>
